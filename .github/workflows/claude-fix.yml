name: Claude Auto-Fix

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude-fix:
    if: github.event.label.name == 'claude-fix'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk
        working-directory: .github/scripts

      - name: Generate fix with Claude
        run: node .github/scripts/claude-fix.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}

      - name: Commit and push fix branch
        run: |
          git config user.name "Forged Bot"
          git config user.email "bot@forged.app"
          git checkout -b fix/issue-${{ github.event.issue.number }}
          git add -A
          git diff --staged --quiet || git commit -m "fix: closes #${{ github.event.issue.number }}"
          git push origin fix/issue-${{ github.event.issue.number }}

      - name: Read Claude explanation
        id: explanation
        run: |
          if [ -f .github/claude-explanation.txt ]; then
            echo "text<<EOF" >> $GITHUB_OUTPUT
            cat .github/claude-explanation.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "text=No explanation provided." >> $GITHUB_OUTPUT
          fi

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "[Claude Fix] ${{ github.event.issue.title }}" \
            --body "## Auto-generated fix for #${{ github.event.issue.number }}

          ${{ steps.explanation.outputs.text }}

          ---
          *Generated by Claude. Human review required before merging.*" \
            --label "claude-generated"
